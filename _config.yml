title: CLAUDE_PLUGINS.OFFICIAL
description: รวมปลั๊กอินทางการของ Anthropic สำหรับ Claude Code (ภาษาไทย)
url: "https://wutgii-worawut.github.io"
baseurl: "/claude-plugins-thai"
lang: th

# No theme — use custom _layouts/default.html
show_downloads: false

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-relative-links
  - jekyll-seo-tag

defaults:
  - scope:
      path: ""
    values:
      layout: default

exclude:
  - README.md
  - .gitignore
  - Gemfile
  - Gemfile.lock
